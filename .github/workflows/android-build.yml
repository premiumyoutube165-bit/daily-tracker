name: Build Android APK (Cloud Compiler)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

   - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Add Capacitor Android Platform
        run: npx cap add android

      - name: Generate Android App Icons (Camouflage Logo)
        run: |
          npm install -D @capacitor/assets
          npx capacitor-assets generate --android --icon

      - name: Sync Web Assets to Android
        run: npx cap sync android

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Compile APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-companion-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
